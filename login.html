<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MyCourses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <a href="index.html" class="logo-container">
        <img src="logo.jpeg" alt="MyCourses Logo" class="logo-img">
        <span class="logo-text">MyCourses</span>
    </a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<main style="display: flex; justify-content: center; align-items: center; padding: 60px 20px;">
    <div class="login-box">
        <h2 style="text-align:center; color: var(--primary-color); margin-bottom: 10px;">Welcome Back</h2>
        <p style="text-align:center; color: var(--text-muted); margin-bottom: 30px;">Login to access your courses</p>

        <form action="#" method="POST" style="display: flex; flex-direction: column;">
            
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Login</button>
        
        </form>

        <p style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="#" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">Sign up</a>
        </p>
    </div>
</main>

<footer style="text-align: center; padding: 20px; background: #1e293b; color: white; margin-top: auto;">
    <p>© 2026 MyCourses Platform. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
